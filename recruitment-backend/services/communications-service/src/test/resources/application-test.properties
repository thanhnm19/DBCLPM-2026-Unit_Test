# Overrides for Test Profile
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway: Disable in tests to avoid needing MySQL-specific migration structure
spring.flyway.enabled=false

# Kafka: Disable/Bypass local connection
spring.kafka.bootstrap-servers=none
spring.kafka.listener.auto-startup=false

# Email: Use dummy settings
spring.mail.host=localhost
spring.mail.port=2525

# Twilio: Mock values
twilio.account.sid=ACmock
twilio.auth.token=mocktoken
twilio.phone.number=+1234567890
