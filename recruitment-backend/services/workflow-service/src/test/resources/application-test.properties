# =============================================================
# CẤU HÌNH TEST - Sử dụng H2 in-memory thay vì MySQL thật
# Đảm bảo test độc lập, không ảnh hưởng DB production
# =============================================================

spring.application.name=workflow-service-test

# H2 In-Memory Database (thay thế MySQL khi chạy test)
spring.datasource.url=jdbc:h2:mem:workflow_test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate - tự tạo bảng từ Entity, xóa khi tắt
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Tắt H2 console (không cần khi test)
spring.h2.console.enabled=false

# JWT config (giả lập, không cần thật)
workflow-service.jwt.base64-secret=dGVzdFNlY3JldEtleUZvclVuaXRUZXN0T25seU5vdFVzZWRJblByb2R1Y3Rpb24=
workflow-service.jwt.access-token-validity-in-seconds=86400
workflow-service.jwt.refresh-token-validity-in-seconds=86400

# Tắt Kafka khi test (không cần broker thật)
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# URL service ngoài (bị mock trong test, không cần thật)
user-service.url=http://localhost:9999
candidate-service.url=http://localhost:9999
services.user-service.url=http://localhost:9999
kafka.topic.recruitment-workflow=recruitment-workflow-events
kafka.topic.notifications=notification-events

# Tắt Security khi test service (không cần JWT thật)
spring.security.enabled=false
