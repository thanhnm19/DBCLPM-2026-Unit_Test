# Test profile: use H2 in-memory database so tests do not depend on local MySQL
spring.datasource.url=jdbc:h2:mem:candidate_service_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate/JPA for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable external integrations during tests (avoid connecting to Kafka, other services)
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

spring.jmx.enabled=false
management.endpoints.jmx.exposure.exclude=* 
